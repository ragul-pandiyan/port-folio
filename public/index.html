        <style>
            body {
                cursor: none;
            }
            .cursor {
                position: fixed;
                width: 10px;
                height: 10px;
                background: #00e5ff;
                border-radius: 50%;
                pointer-events: none;
                z-index: 9999;
                transform: translate(-50%, -50%);
                transition: width 0.2s, height 0.2s, opacity 0.2s;
                mix-blend-mode: screen;
            }
            .cursor-ring {
                position: fixed;
                width: 36px;
                height: 36px;
                border: 1px solid #00e5ff;
                border-radius: 50%;
                pointer-events: none;
                z-index: 9998;
                transform: translate(-50%, -50%);
                transition: all 0.12s ease;
                opacity: 0.5;
            }
        </style>
